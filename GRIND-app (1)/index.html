<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <meta name="theme-color" content="#000000"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="GRIND"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <link rel="manifest" href="./manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <title>GRIND</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #000; color: #fff; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
    #app { height: 100%; overflow: hidden; }
    .screen { display: none; flex-direction: column; height: 100%; overflow-y: auto; max-width: 480px; margin: 0 auto; padding-bottom: 80px; }
    .screen.active { display: flex; }
    button { cursor: pointer; font-family: 'Courier New', Courier, monospace; }
    button:focus { outline: none; }
    input:focus { outline: none; }
    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    ::-webkit-scrollbar { width: 2px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: #1a1a1a; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.1} }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .blink { animation: blink 1s infinite; }
    .pulse { animation: pulse 0.4s ease; }
    .fade-in { animation: fadeIn 0.3s ease; }

    /* ── TOP BAR ── */
    .top-bar { display:flex; justify-content:space-between; align-items:center; padding:18px 20px; border-bottom:1px solid #1a1a1a; flex-shrink:0; }
    .rank-badge { font-size:14px; font-weight:700; letter-spacing:2px; }
    .xp-text { font-size:14px; font-weight:700; letter-spacing:2px; }

    /* ── HERO ── */
    .hero { padding:32px 20px 16px; flex-shrink:0; }
    .greeting { font-size:26px; font-weight:700; letter-spacing:4px; margin-bottom:10px; line-height:1.15; }
    .quote-text { font-size:13px; font-weight:600; color:#555; font-style:italic; line-height:1.6; }

    /* ── STATS ROW ── */
    .stats-row { display:flex; padding:0 20px 16px; gap:8px; flex-shrink:0; }
    .stat-box { flex:1; border:1px solid #1a1a1a; padding:14px 8px; text-align:center; }
    .stat-num { display:block; font-size:26px; font-weight:700; letter-spacing:2px; }
    .stat-label { display:block; font-size:11px; font-weight:700; color:#555; letter-spacing:3px; margin-top:5px; }

    /* ── GOAL ── */
    .goal-wrap { margin:0 20px 16px; border:1px solid #1a1a1a; padding:16px; flex-shrink:0; }
    .goal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
    .goal-title { font-size:12px; font-weight:700; letter-spacing:4px; color:#888; }
    .goal-edit-btn { background:transparent; color:#444; border:1px solid #222; font-size:11px; font-weight:700; letter-spacing:2px; padding:4px 10px; }
    .goal-set-btn { width:100%; background:transparent; color:#444; border:1px dashed #222; padding:14px; font-size:12px; font-weight:700; letter-spacing:3px; }
    .goal-input-row { display:flex; gap:8px; align-items:center; }
    .goal-input { flex:1; background:#0a0a0a; color:#fff; border:1px solid #333; padding:12px 14px; font-size:16px; font-weight:700; font-family:'Courier New',monospace; }
    .goal-confirm-btn { background:#fff; color:#000; border:none; padding:12px 18px; font-size:13px; font-weight:700; letter-spacing:2px; }
    .goal-cancel-btn { background:transparent; color:#444; border:1px solid #222; padding:12px 14px; font-size:13px; }
    .goal-body { display:flex; align-items:center; gap:20px; }
    .goal-info { flex:1; }
    .goal-left-num { font-size:42px; font-weight:700; line-height:1; margin-bottom:4px; }
    .goal-left-label { font-size:13px; font-weight:700; color:#555; letter-spacing:3px; margin-bottom:10px; }
    .goal-motivation { font-size:12px; font-weight:600; color:#444; font-style:italic; line-height:1.5; }
    .goal-done-msg { font-size:20px; font-weight:700; color:#4ade80; letter-spacing:3px; margin-bottom:6px; }
    .goal-done-sub { font-size:12px; font-weight:700; color:#555; letter-spacing:2px; }
    .circle-wrap { position:relative; width:92px; height:92px; flex-shrink:0; }
    .circle-inner { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .circle-count { font-size:22px; font-weight:700; line-height:1; }
    .circle-goal-label { font-size:11px; font-weight:700; color:#555; line-height:1; margin-top:2px; }

    /* ── HEATMAP ── */
    .heat-wrap { padding:0 20px 16px; flex-shrink:0; }
    .heat-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    .heat-title { font-size:11px; font-weight:700; color:#555; letter-spacing:3px; }
    .heat-legend { display:flex; align-items:center; gap:4px; }
    .heat-leg-txt { font-size:11px; font-weight:700; color:#444; }
    .heat-leg-cell { width:11px; height:11px; border-radius:2px; }
    .heat-grid { display:grid; grid-template-columns:repeat(15,1fr); gap:3px; }
    .heat-cell { aspect-ratio:1; border-radius:2px; }
    .heat-note { font-size:11px; font-weight:700; color:#333; margin-top:6px; letter-spacing:1px; }

    /* ── PROGRESS BAR ── */
    .progress-wrap { padding:0 20px 18px; flex-shrink:0; }
    .progress-bar { height:3px; background:#0d1117; }
    .progress-fill { height:100%; background:#4ade80; transition:width 0.6s; }
    .progress-label { font-size:11px; font-weight:700; color:#444; letter-spacing:2px; margin-top:5px; display:block; }

    /* ── NAV ── */
    .nav-row { padding:4px 20px 0; flex-shrink:0; }
    .primary-btn { width:100%; background:#fff; color:#000; border:none; padding:16px; font-size:14px; font-weight:700; letter-spacing:4px; }
    .sec-row { display:flex; gap:8px; margin-top:8px; }
    .sec-btn { flex:1; background:transparent; color:#555; border:1px solid #1a1a1a; padding:12px; font-size:12px; font-weight:700; letter-spacing:3px; }

    /* ── PRACTICE ── */
    #screen-practice { justify-content:center; align-items:center; padding:0; position:relative; }
    .center-full { display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; gap:20px; position:relative; width:100%; }
    .countdown-num { font-size:120px; font-weight:700; letter-spacing:-4px; line-height:1; }
    .q-num { font-size:13px; font-weight:700; letter-spacing:4px; color:#444; margin-bottom:0; }
    .live-timer { font-size:62px; font-weight:700; letter-spacing:2px; font-variant-numeric:tabular-nums; line-height:1; }
    .tap-hint { font-size:12px; font-weight:700; color:#222; letter-spacing:4px; position:absolute; bottom:80px; }
    .result-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; gap:14px; padding:20px; position:relative; width:100%; }
    .big-time { font-size:64px; font-weight:700; letter-spacing:2px; line-height:1; }
    .result-stats { display:flex; gap:30px; margin-top:8px; }
    .r-stat { text-align:center; }
    .r-stat-val { display:block; font-size:20px; font-weight:700; }
    .r-stat-label { display:block; font-size:11px; font-weight:700; color:#444; letter-spacing:3px; margin-top:5px; }
    .practice-top { position:absolute; top:0; left:0; right:0; display:flex; justify-content:space-between; padding:14px 20px; z-index:10; max-width:480px; margin:0 auto; }
    .ghost-btn { background:transparent; color:#444; border:none; font-size:13px; font-weight:700; letter-spacing:2px; padding:8px; }

    /* ── PAGE HEADER ── */
    .page-header { display:flex; align-items:center; gap:16px; padding:18px 20px; border-bottom:1px solid #1a1a1a; flex-shrink:0; }
    .page-title { font-size:14px; font-weight:700; letter-spacing:4px; }
    .back-btn { background:transparent; color:#555; border:none; font-size:13px; font-weight:700; letter-spacing:2px; padding:0; }

    /* ── HISTORY ── */
    .hist-list { padding:20px; display:flex; flex-direction:column; gap:12px; }
    .hist-empty { color:#444; letter-spacing:2px; font-size:13px; font-weight:700; }
    .hist-card { border:1px solid #1a1a1a; padding:16px; }
    .hist-date { font-size:12px; font-weight:700; color:#555; letter-spacing:3px; margin-bottom:10px; }
    .hist-meta { display:flex; gap:14px; font-size:13px; font-weight:700; margin-bottom:10px; flex-wrap:wrap; }
    .mini-chart { display:flex; gap:2px; align-items:flex-end; height:36px; }
    .mini-bar { width:3px; background:#fff; min-height:3px; }

    /* ── DASHBOARD ── */
    .rank-display { padding:26px 20px; text-align:center; border-bottom:1px solid #111; flex-shrink:0; }
    .rank-symbol-big { font-size:34px; font-weight:700; letter-spacing:4px; margin-bottom:6px; }
    .rank-name-big { font-size:18px; font-weight:700; letter-spacing:6px; }
    .rank-xp-text { font-size:14px; font-weight:700; color:#555; letter-spacing:3px; margin-top:5px; }
    .rank-p-bar { height:2px; background:#0d0d0d; margin:12px 40px 0; }
    .rank-p-fill { height:100%; transition:width 0.5s; }
    .rank-next-text { font-size:11px; font-weight:700; color:#444; letter-spacing:2px; margin-top:8px; }
    .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:1px; margin:18px 20px; border:1px solid #111; flex-shrink:0; }
    .d-stat { border:1px solid #111; padding:14px 12px; text-align:center; }
    .d-stat-n { display:block; font-size:18px; font-weight:700; letter-spacing:1px; }
    .d-stat-l { display:block; font-size:11px; font-weight:700; color:#555; letter-spacing:3px; margin-top:5px; }
    .graph-wrap { padding:0 20px 16px; flex-shrink:0; }
    .tab-row { display:flex; gap:8px; margin-bottom:12px; }
    .tab-btn { background:transparent; color:#444; border:1px solid #1a1a1a; padding:8px 16px; font-size:11px; font-weight:700; letter-spacing:3px; }
    .tab-btn.active { border-color:#4ade80; color:#4ade80; }
    .graph-subtitle { font-size:11px; font-weight:700; color:#444; letter-spacing:2px; margin-bottom:8px; }
    .graph-note { font-size:11px; font-weight:700; color:#333; letter-spacing:1px; margin-top:4px; }
    .graph-empty { height:80px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:#222; letter-spacing:3px; }
    .x-labels { display:flex; margin-top:2px; }
    .x-label { font-size:9px; font-weight:700; color:#333; flex:1; text-align:center; }
    .xp-box { margin:0 20px 16px; border:1px solid #1a1a1a; padding:16px; flex-shrink:0; }
    .xp-box-title { font-size:11px; font-weight:700; color:#555; letter-spacing:3px; margin-bottom:10px; }
    .xp-line { font-size:12px; font-weight:700; color:#555; margin:5px 0; letter-spacing:1px; }
    .xp-line.red { color:#ef4444; }
    .ladder-wrap { padding:0 20px 40px; }
    .section-title { font-size:11px; font-weight:700; color:#555; letter-spacing:3px; margin:20px 0 12px; }
    .ladder-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid #0d0d0d; transition:opacity 0.3s; }
    .ladder-sym { font-size:13px; font-weight:700; width:36px; }
    .ladder-name { flex:1; font-size:12px; font-weight:700; letter-spacing:3px; }
    .ladder-xp { font-size:12px; font-weight:700; color:#444; }
    .ladder-you { font-size:11px; font-weight:700; color:#4ade80; letter-spacing:2px; }

    /* ── INSTALL BANNER ── */
    .install-banner { position:fixed; bottom:0; left:0; right:0; background:#111; border-top:1px solid #222; padding:14px 20px; display:flex; align-items:center; gap:12px; z-index:100; max-width:480px; margin:0 auto; }
    .install-text { flex:1; font-size:12px; font-weight:700; color:#888; letter-spacing:1px; line-height:1.4; }
    .install-btn { background:#fff; color:#000; border:none; padding:10px 16px; font-size:12px; font-weight:700; letter-spacing:2px; white-space:nowrap; }
    .install-dismiss { background:transparent; color:#444; border:none; font-size:16px; padding:4px 8px; }
  </style>
</head>
<body>
<div id="app">
  <!-- HOME -->
  <div id="screen-home" class="screen active">
    <div class="top-bar">
      <span id="home-rank-badge" class="rank-badge"></span>
      <span id="home-xp" class="xp-text"></span>
    </div>
    <div class="hero">
      <h1 id="home-greeting" class="greeting"></h1>
      <p id="home-quote" class="quote-text"></p>
    </div>
    <div class="stats-row">
      <div class="stat-box"><span id="stat-today" class="stat-num">0</span><span class="stat-label">TODAY</span></div>
      <div class="stat-box"><span id="stat-total" class="stat-num">0</span><span class="stat-label">TOTAL</span></div>
      <div class="stat-box"><span id="stat-streak" class="stat-num">0</span><span class="stat-label">STREAK 🔥</span></div>
    </div>
    <div id="goal-section"></div>
    <div class="heat-wrap">
      <div class="heat-header">
        <span class="heat-title">ACTIVITY</span>
        <div class="heat-legend">
          <span class="heat-leg-txt">less</span>
          <div class="heat-leg-cell" style="background:#0d1117"></div>
          <div class="heat-leg-cell" style="background:#0e4429"></div>
          <div class="heat-leg-cell" style="background:#006d32"></div>
          <div class="heat-leg-cell" style="background:#26a641"></div>
          <div class="heat-leg-cell" style="background:#39d353"></div>
          <span class="heat-leg-txt">more</span>
        </div>
      </div>
      <div id="heat-grid" class="heat-grid"></div>
      <div class="heat-note">
        <span style="color:#39d353">■</span> 20+ &nbsp;
        <span style="color:#26a641">■</span> 11–20 &nbsp;
        <span style="color:#006d32">■</span> 6–10 &nbsp;
        <span style="color:#0e4429">■</span> 1–5
      </div>
    </div>
    <div id="xp-progress-wrap" class="progress-wrap"></div>
    <div class="nav-row">
      <button class="primary-btn" onclick="startPractice()">▶  START PRACTICE</button>
      <div class="sec-row">
        <button class="sec-btn" onclick="showScreen('history')">HISTORY</button>
        <button class="sec-btn" onclick="showScreen('dashboard')">DASHBOARD</button>
      </div>
    </div>
  </div>

  <!-- PRACTICE -->
  <div id="screen-practice" class="screen" onclick="handlePracticeTap()">
    <div class="practice-top" onclick="event.stopPropagation()">
      <button class="ghost-btn" onclick="finishPractice()">FINISH</button>
      <button class="ghost-btn" onclick="showScreen('home')">✕</button>
    </div>
    <div id="practice-content"></div>
  </div>

  <!-- HISTORY -->
  <div id="screen-history" class="screen">
    <div class="page-header">
      <button class="back-btn" onclick="showScreen('home')">← BACK</button>
      <span class="page-title">HISTORY</span>
    </div>
    <div id="hist-list" class="hist-list"></div>
  </div>

  <!-- DASHBOARD -->
  <div id="screen-dashboard" class="screen">
    <div class="page-header">
      <button class="back-btn" onclick="showScreen('home')">← BACK</button>
      <span class="page-title">DASHBOARD</span>
    </div>
    <div id="dashboard-content"></div>
  </div>
</div>

<div id="install-banner" class="install-banner" style="display:none">
  <div class="install-text">Add GRIND to your home screen for the full app experience</div>
  <button class="install-btn" id="install-btn">INSTALL</button>
  <button class="install-dismiss" onclick="dismissInstall()">✕</button>
</div>

<script>
// ─── DATA ─────────────────────────────────────────────────────────────────────
const RANKS = [
  { name:"ROOKIE",     min:0,     symbol:"[ ]",  color:"#555" },
  { name:"GRINDER",    min:500,   symbol:"[/]",  color:"#777" },
  { name:"FOCUSED",    min:1500,  symbol:"[+]",  color:"#999" },
  { name:"SHARP",      min:3500,  symbol:"[#]",  color:"#bbb" },
  { name:"ELITE",      min:7000,  symbol:"[★]",  color:"#ddd" },
  { name:"SIGMA",      min:12000, symbol:"[◈]",  color:"#eee" },
  { name:"BEAST MODE", min:20000, symbol:"[⚡]", color:"#fff" },
];
const QUOTES = [
  "Pain is temporary. Rank is forever.",
  "Every question is a rep. Don't skip.",
  "Speed is a skill. Train it daily.",
  "The exam doesn't care about your mood.",
  "One more question. Always one more.",
  "Discomfort is the price of excellence.",
  "Your future self is watching. Don't embarrass him.",
  "Slow is smooth. Smooth becomes fast.",
  "Champions do it when they don't feel like it.",
  "The grind is the reward.",
  "No shortcuts. No excuses. Just reps.",
  "Average people wait for motivation. You create it.",
];
const GOAL_QUOTES = [
  "Every question closes the gap.",
  "Don't stop until you hit that number.",
  "The goal doesn't move. You do.",
  "Finish what you started.",
  "Almost there — don't slow down now.",
  "Halfway means nothing. Finish it.",
  "One rep at a time. Keep going.",
];
const GREETINGS = [
  "LET'S GET IT.",
  "LOCK IN.",
  "TIME TO GRIND.",
  "NO DAYS OFF.",
  "GET THAT SHIT DONE.",
  "FOCUS. EXECUTE. WIN.",
  "YOU DIDN'T COME THIS FAR TO STOP.",
];

// ─── STATE ────────────────────────────────────────────────────────────────────
let sessions = [];
let xp = 0;
let goal = null;
const greeting = GREETINGS[Math.floor(Math.random() * GREETINGS.length)];
const quote = QUOTES[new Date().getDate() % QUOTES.length];
const goalQuote = GOAL_QUOTES[new Date().getDate() % GOAL_QUOTES.length];

// Practice state
let practicePhase = "idle"; // idle | countdown | timing | result
let practiceCount = 3;
let practiceStartTime = null;
let practiceTimes = [];
let practiceLastTime = null;
let practiceInterval = null;
let countdownTimeout = null;

// ─── STORAGE (localStorage) ───────────────────────────────────────────────────
function load() {
  try { sessions = JSON.parse(localStorage.getItem("grind_sessions") || "[]"); } catch { sessions = []; }
  try { xp = parseInt(localStorage.getItem("grind_xp") || "0"); } catch { xp = 0; }
  try { goal = JSON.parse(localStorage.getItem("grind_goal") || "null"); } catch { goal = null; }
}
function saveSessions() { localStorage.setItem("grind_sessions", JSON.stringify(sessions)); }
function saveXp() { localStorage.setItem("grind_xp", String(xp)); }
function saveGoal() { localStorage.setItem("grind_goal", JSON.stringify(goal)); }

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function todayKey() { return new Date().toISOString().split("T")[0]; }
function getRank(x) { let r = RANKS[0]; for (const rk of RANKS) { if (x >= rk.min) r = rk; } return r; }
function getNextRank(x) { for (const r of RANKS) { if (x < r.min) return r; } return null; }
function getStreak() {
  let streak = 0; const d = new Date();
  while (true) {
    const k = d.toISOString().split("T")[0];
    if (sessions.find(s => s.date === k && s.times.length > 0)) { streak++; d.setDate(d.getDate()-1); } else break;
  }
  return streak;
}
function fmtMs(ms) {
  if (!ms && ms !== 0) return "--";
  const s = ms / 1000;
  return s < 60 ? s.toFixed(2)+"s" : Math.floor(s/60)+"m"+((s%60).toFixed(0))+"s";
}
function fmtMs1(ms) {
  if (!ms && ms !== 0) return "--";
  const s = ms / 1000;
  return s < 60 ? s.toFixed(1)+"s" : Math.floor(s/60)+"m"+((s%60).toFixed(0))+"s";
}
function heatColor(n) {
  if (n === 0) return "#0d1117";
  if (n <= 5)  return "#0e4429";
  if (n <= 10) return "#006d32";
  if (n <= 20) return "#26a641";
  return "#39d353";
}
function calcXpGain(times, allSessions) {
  const count = times.length; if (!count) return 0;
  const todayAvg = times.reduce((a,b)=>a+b,0)/count;
  const base = count>=30?8:count>=20?5:count>=10?2:1;
  let pts = count * base;
  if (count >= 20) { const sb = todayAvg<20000?10:todayAvg<40000?6:todayAvg<60000?3:0; pts += count*sb; }
  const past = allSessions.filter(s=>s.date!==todayKey()&&s.times.length>0);
  if (past.length) {
    const last = past[past.length-1];
    const la = last.times.reduce((a,b)=>a+b,0)/last.times.length;
    const imp = (la-todayAvg)/la;
    if (imp>0.1) pts += Math.floor(imp*200);
    else if (imp>0.05) pts += 30;
  }
  return Math.floor(pts);
}
function calcXpPenalty(allSessions) {
  const recent = [...allSessions].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,3);
  if (recent.length < 3) return 0;
  if (recent.every(s=>s.times.length<15)) return 80;
  const avgs = recent.map(s=>s.times.reduce((a,b)=>a+b,0)/s.times.length);
  if (avgs[0]>avgs[1]&&avgs[1]>avgs[2]) return 50;
  return 0;
}

// ─── SCREEN NAV ───────────────────────────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  if (name === 'home') renderHome();
  if (name === 'history') renderHistory();
  if (name === 'dashboard') renderDashboard();
}

// ─── HOME ─────────────────────────────────────────────────────────────────────
function renderHome() {
  const today = todayKey();
  const todaySess = sessions.find(s=>s.date===today);
  const todayCount = todaySess?.times.length || 0;
  const rank = getRank(xp);
  const next = getNextRank(xp);

  document.getElementById('home-rank-badge').textContent = rank.symbol + " " + rank.name;
  document.getElementById('home-rank-badge').style.color = rank.color;
  document.getElementById('home-xp').textContent = xp.toLocaleString() + " XP";
  document.getElementById('home-greeting').textContent = greeting;
  document.getElementById('home-quote').textContent = '"' + quote + '"';

  document.getElementById('stat-today').textContent = todayCount;
  document.getElementById('stat-today').style.color = todayCount >= 20 ? "#4ade80" : "#fff";
  document.getElementById('stat-total').textContent = sessions.reduce((a,s)=>a+s.times.length,0);
  document.getElementById('stat-streak').textContent = getStreak();

  renderGoal(todayCount);
  renderHeatmap();

  const pw = document.getElementById('xp-progress-wrap');
  if (next) {
    const pct = Math.min(100, ((xp - rank.min)/(next.min - rank.min))*100);
    pw.innerHTML = `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <span class="progress-label">${(next.min-xp).toLocaleString()} XP to ${next.name} ${next.symbol}</span>`;
  } else pw.innerHTML = '';
}

function renderGoal(todayCount) {
  const today = todayKey();
  const todayGoal = goal?.date === today ? goal.target : null;
  const el = document.getElementById('goal-section');

  if (!todayGoal) {
    el.innerHTML = `<div class="goal-wrap">
      <div class="goal-header"><span class="goal-title">TODAY'S GOAL</span></div>
      <button class="goal-set-btn" onclick="showGoalInput()">+ SET A GOAL FOR TODAY</button>
    </div>`;
    return;
  }

  const pct = Math.min(1, todayCount / todayGoal);
  const left = Math.max(0, todayGoal - todayCount);
  const done = left === 0;
  const ringColor = pct < 0.4 ? "#555" : pct < 0.7 ? "#888" : pct < 1 ? "#4ade80" : "#39d353";
  const R = 38, cx = 46, cy = 46, circ = 2*Math.PI*R;
  const dash = circ * pct;

  el.innerHTML = `<div class="goal-wrap fade-in">
    <div class="goal-header">
      <span class="goal-title">TODAY'S GOAL</span>
      <button class="goal-edit-btn" onclick="showGoalInput()">EDIT</button>
    </div>
    <div class="goal-body">
      <div class="circle-wrap">
        <svg width="92" height="92" viewBox="0 0 92 92">
          <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="#111" stroke-width="6"/>
          <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${ringColor}" stroke-width="6"
            stroke-dasharray="${dash} ${circ}" stroke-linecap="round"
            transform="rotate(-90 ${cx} ${cy})" style="transition:stroke-dasharray 0.5s,stroke 0.4s"/>
        </svg>
        <div class="circle-inner">
          <span class="circle-count" style="color:${done?'#4ade80':'#fff'}">${todayCount}</span>
          <span class="circle-goal-label">/ ${todayGoal}</span>
        </div>
      </div>
      <div class="goal-info">
        ${done
          ? `<div class="goal-done-msg">GOAL CRUSHED ⚡</div><div class="goal-done-sub">Target: ${todayGoal} questions</div>`
          : `<div class="goal-left-num">${left}</div>
             <div class="goal-left-label">questions left</div>
             <div class="goal-motivation">"${goalQuote}"</div>`
        }
      </div>
    </div>
  </div>`;
}

function showGoalInput() {
  const el = document.getElementById('goal-section');
  el.innerHTML = `<div class="goal-wrap">
    <div class="goal-header"><span class="goal-title">TODAY'S GOAL</span></div>
    <div class="goal-input-row">
      <input class="goal-input" type="number" id="goal-input-val" placeholder="e.g. 30" autofocus/>
      <button class="goal-confirm-btn" onclick="confirmGoal()">SET</button>
      <button class="goal-cancel-btn" onclick="renderHome()">✕</button>
    </div>
  </div>`;
  document.getElementById('goal-input-val').focus();
  document.getElementById('goal-input-val').addEventListener('keydown', e => { if (e.key==='Enter') confirmGoal(); });
}

function confirmGoal() {
  const n = parseInt(document.getElementById('goal-input-val')?.value || "0");
  if (n > 0) {
    goal = { date: todayKey(), target: n };
    saveGoal();
    renderHome();
  }
}

function renderHeatmap() {
  const grid = document.getElementById('heat-grid');
  const WEEKS = 15;
  let html = '';
  for (let i = WEEKS*7-1; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate()-i);
    const key = d.toISOString().split("T")[0];
    const sess = sessions.find(x=>x.date===key);
    const count = sess?.times.length || 0;
    html += `<div class="heat-cell" style="background:${heatColor(count)}" title="${key}: ${count} Qs"></div>`;
  }
  grid.innerHTML = html;
}

// ─── PRACTICE ─────────────────────────────────────────────────────────────────
function startPractice() {
  practiceTimes = [];
  practiceLastTime = null;
  practicePhase = "countdown";
  practiceCount = 3;
  showScreen('practice');
  runCountdown();
}

function runCountdown() {
  renderPractice();
  if (practiceCount === 0) {
    setTimeout(() => {
      practicePhase = "timing";
      practiceStartTime = Date.now();
      renderPractice();
      startLiveTimer();
    }, 400);
    return;
  }
  countdownTimeout = setTimeout(() => { practiceCount--; runCountdown(); }, 1000);
}

function startLiveTimer() {
  if (practiceInterval) clearInterval(practiceInterval);
  practiceInterval = setInterval(() => {
    if (practicePhase === "timing") {
      const el = document.getElementById('live-timer-display');
      if (el) el.textContent = fmtMs(Date.now() - practiceStartTime);
    } else clearInterval(practiceInterval);
  }, 50);
}

function handlePracticeTap() {
  if (practicePhase === "timing") {
    const elapsed = Date.now() - practiceStartTime;
    practiceTimes.push(elapsed);
    practiceLastTime = elapsed;
    practicePhase = "result";
    clearInterval(practiceInterval);
    renderPractice();
  } else if (practicePhase === "result") {
    practicePhase = "timing";
    practiceStartTime = Date.now();
    renderPractice();
    startLiveTimer();
  }
}

function finishPractice() {
  clearInterval(practiceInterval);
  clearTimeout(countdownTimeout);
  if (practiceTimes.length > 0) savePracticeSession(practiceTimes);
  practicePhase = "idle";
  showScreen('home');
}

function savePracticeSession(times) {
  const today = todayKey();
  const idx = sessions.findIndex(s=>s.date===today);
  if (idx >= 0) sessions[idx].times = [...sessions[idx].times, ...times];
  else sessions.push({ date: today, times });
  saveSessions();
  const todayTimes = sessions.find(s=>s.date===today).times;
  const gained = calcXpGain(todayTimes, sessions);
  const penalty = calcXpPenalty(sessions);
  xp = Math.max(0, xp + gained - penalty);
  saveXp();
}

function renderPractice() {
  const el = document.getElementById('practice-content');
  if (practicePhase === "countdown") {
    const label = practiceCount === 0 ? "GO" : String(practiceCount);
    el.innerHTML = `<div class="center-full"><div class="countdown-num pulse">${label}</div></div>`;
  } else if (practicePhase === "timing") {
    const qn = practiceTimes.length + 1;
    el.innerHTML = `<div class="center-full">
      <p class="q-num">Q${qn}</p>
      <div class="live-timer" id="live-timer-display">0.00s</div>
      <p class="tap-hint">TAP TO STOP</p>
    </div>`;
  } else if (practicePhase === "result") {
    const avg = practiceTimes.reduce((a,b)=>a+b,0)/practiceTimes.length;
    const best = Math.min(...practiceTimes);
    el.innerHTML = `<div class="result-screen">
      <p class="q-num">Q${practiceTimes.length} DONE</p>
      <div class="big-time">${fmtMs(practiceLastTime)}</div>
      <div class="result-stats">
        <div class="r-stat"><span class="r-stat-val">${fmtMs1(avg)}</span><span class="r-stat-label">AVG</span></div>
        <div class="r-stat"><span class="r-stat-val">${fmtMs(best)}</span><span class="r-stat-label">BEST</span></div>
        <div class="r-stat"><span class="r-stat-val">${practiceTimes.length}</span><span class="r-stat-label">DONE</span></div>
      </div>
      <p class="tap-hint">TAP ANYWHERE FOR NEXT</p>
    </div>`;
  }
}

// ─── HISTORY ──────────────────────────────────────────────────────────────────
function renderHistory() {
  const sorted = [...sessions].sort((a,b)=>b.date.localeCompare(a.date));
  const el = document.getElementById('hist-list');
  if (!sorted.length) { el.innerHTML = '<p class="hist-empty">No sessions yet. Get to work.</p>'; return; }
  el.innerHTML = sorted.map(sess => {
    const avg = sess.times.reduce((a,b)=>a+b,0)/sess.times.length;
    const best = Math.min(...sess.times);
    const maxT = Math.max(...sess.times);
    const color = sess.times.length >= 20 ? "#4ade80" : "#fff";
    const bars = sess.times.map(t => {
      const h = Math.max(3, (t/maxT)*36);
      return `<div class="mini-bar" style="height:${h}px"></div>`;
    }).join('');
    return `<div class="hist-card">
      <div class="hist-date">${sess.date}</div>
      <div class="hist-meta">
        <span style="color:${color};font-weight:700">${sess.times.length} Qs</span>
        <span>AVG ${fmtMs1(avg)}</span>
        <span>BEST ${fmtMs(best)}</span>
      </div>
      <div class="mini-chart">${bars}</div>
    </div>`;
  }).join('');
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
let dashTab = "avgtime";
function renderDashboard() {
  const rank = getRank(xp);
  const next = getNextRank(xp);
  const progress = next ? Math.min(100, ((xp-rank.min)/(next.min-rank.min))*100) : 100;
  const allTimes = sessions.flatMap(s=>s.times);
  const totalQ = sessions.reduce((a,s)=>a+s.times.length,0);
  const overallAvg = allTimes.length ? allTimes.reduce((a,b)=>a+b,0)/allTimes.length : 0;
  const bestEver = allTimes.length ? Math.min(...allTimes) : 0;

  const days = 21; const curve = [];
  for (let i=days-1;i>=0;i--) {
    const d=new Date(); d.setDate(d.getDate()-i);
    const k=d.toISOString().split("T")[0];
    const s=sessions.find(x=>x.date===k);
    curve.push({ label:k.slice(5), avg:s?.times.length?s.times.reduce((a,b)=>a+b,0)/s.times.length:null, count:s?.times.length||0 });
  }

  const rankProgress = next
    ? `<div class="rank-p-bar"><div class="rank-p-fill" style="width:${progress}%;background:${rank.color}"></div></div>
       <div class="rank-next-text">${(next.min-xp).toLocaleString()} XP to ${next.symbol} ${next.name}</div>`
    : `<div style="font-size:13px;font-weight:700;color:#4ade80;letter-spacing:3px;margin-top:8px">MAX RANK ACHIEVED</div>`;

  const ladderRows = RANKS.map((r,i) => {
    const op = xp >= r.min ? 1 : 0.2;
    const cur = xp>=r.min && xp<(RANKS[i+1]?.min||Infinity) ? '<span class="ladder-you">← YOU</span>' : '';
    return `<div class="ladder-row" style="opacity:${op}">
      <span class="ladder-sym" style="color:${r.color}">${r.symbol}</span>
      <span class="ladder-name">${r.name}</span>
      <span class="ladder-xp">${r.min.toLocaleString()} XP</span>
      ${cur}
    </div>`;
  }).join('');

  document.getElementById('dashboard-content').innerHTML = `
    <div class="rank-display">
      <div class="rank-symbol-big" style="color:${rank.color}">${rank.symbol}</div>
      <div class="rank-name-big" style="color:${rank.color}">${rank.name}</div>
      <div class="rank-xp-text">${xp.toLocaleString()} XP</div>
      ${rankProgress}
    </div>
    <div class="stats-grid">
      <div class="d-stat"><span class="d-stat-n">${totalQ}</span><span class="d-stat-l">TOTAL Qs</span></div>
      <div class="d-stat"><span class="d-stat-n">${allTimes.length?fmtMs1(overallAvg):"--"}</span><span class="d-stat-l">AVG TIME</span></div>
      <div class="d-stat"><span class="d-stat-n">${allTimes.length?fmtMs(bestEver):"--"}</span><span class="d-stat-l">BEST EVER</span></div>
      <div class="d-stat"><span class="d-stat-n">${getStreak()}</span><span class="d-stat-l">STREAK</span></div>
    </div>
    <div class="graph-wrap">
      <div class="tab-row">
        <button class="tab-btn ${dashTab==='avgtime'?'active':''}" onclick="switchDashTab('avgtime')">AVG TIME</button>
        <button class="tab-btn ${dashTab==='questions'?'active':''}" onclick="switchDashTab('questions')">QUESTIONS</button>
      </div>
      <div id="graph-area"></div>
    </div>
    <div class="xp-box">
      <div class="xp-box-title">XP SYSTEM</div>
      <p class="xp-line">≥ 30 Qs/day → 8 XP each + speed bonus</p>
      <p class="xp-line">20–29 Qs/day → 5 XP each + speed bonus</p>
      <p class="xp-line">10–19 Qs/day → 2 XP each (no bonus)</p>
      <p class="xp-line">&lt;10 Qs → 1 XP each</p>
      <p class="xp-line">Avg time improving → up to +200 bonus XP</p>
      <p class="xp-line red">3 lazy days in a row → −80 XP decay</p>
    </div>
    <div class="ladder-wrap">
      <div class="section-title">RANK LADDER</div>
      ${ladderRows}
    </div>`;

  renderGraph(curve);
}

function switchDashTab(tab) {
  dashTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => { if (b.textContent.toLowerCase().includes(tab==='avgtime'?'time':'quest')) b.classList.add('active'); });
  const days=21; const curve=[];
  for (let i=days-1;i>=0;i--) {
    const d=new Date(); d.setDate(d.getDate()-i);
    const k=d.toISOString().split("T")[0];
    const s=sessions.find(x=>x.date===k);
    curve.push({ label:k.slice(5), avg:s?.times.length?s.times.reduce((a,b)=>a+b,0)/s.times.length:null, count:s?.times.length||0 });
  }
  renderGraph(curve);
}

function renderGraph(curve) {
  const el = document.getElementById('graph-area');
  if (!el) return;
  const isAvg = dashTab === 'avgtime';
  const data = isAvg ? curve.map(c=>({label:c.label,val:c.avg})) : curve.map(c=>({label:c.label,val:c.count>0?c.count:null}));
  const pts = data.filter(d=>d.val!==null);
  if (!pts.length) { el.innerHTML = `<div class="graph-empty">Start grinding to see your curve.</div>`; return; }
  const vals = pts.map(d=>d.val);
  const minV=Math.min(...vals), maxV=Math.max(...vals,1), range=maxV-minV||1;
  const W=400,H=110,PX=16,PY=10;
  const coords = data.map((d,i)=>{
    const x=PX+(i/(data.length-1))*(W-PX*2);
    if(d.val===null) return null;
    const norm=(d.val-minV)/range;
    const y=isAvg?PY+norm*(H-PY*2):H-PY-norm*(H-PY*2);
    return {x,y,val:d.val};
  });
  const valid=coords.filter(Boolean);
  const pathD=valid.map((p,i)=>`${i===0?'M':'L'}${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' ');
  let threshLine='';
  if (!isAvg) {
    const th=20; if(th>=minV&&th<=maxV){const n=(th-minV)/range;const ty=H-PY-n*(H-PY*2);threshLine=`<line x1="${PX}" y1="${ty}" x2="${W-PX}" y2="${ty}" stroke="#4ade8033" stroke-width="1.5" stroke-dasharray="5 5"/>`;}
  }
  const gridLines=[0.25,0.5,0.75].map(t=>`<line x1="${PX}" y1="${PY+t*(H-PY*2)}" x2="${W-PX}" y2="${PY+t*(H-PY*2)}" stroke="#161616" stroke-width="1"/>`).join('');
  const dots=valid.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="2.5" fill="#4ade80"/>`).join('');
  const xlabels=data.map((d,i)=>`<span class="x-label">${i%4===0?d.label:''}</span>`).join('');
  const subtitle = isAvg ? 'Daily average solve time — lower is better' : 'Questions solved per day — target: 20+';
  const note = isAvg ? '↓ Trend going down = you\'re getting faster' : 'Dashed = 20 Qs/day target';
  el.innerHTML = `
    <p class="graph-subtitle">${subtitle}</p>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;display:block">${gridLines}${threshLine}<path d="${pathD}" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>${dots}</svg>
    <div class="x-labels">${xlabels}</div>
    <p class="graph-note">${note}</p>`;
}

// ─── PWA INSTALL ──────────────────────────────────────────────────────────────
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  if (!localStorage.getItem('install_dismissed')) {
    document.getElementById('install-banner').style.display = 'flex';
  }
});
document.getElementById('install-btn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') dismissInstall();
  deferredPrompt = null;
});
function dismissInstall() {
  localStorage.setItem('install_dismissed','1');
  document.getElementById('install-banner').style.display = 'none';
}
// iOS instructions
const isIos = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
const isStandalone = window.navigator.standalone;
if (isIos && !isStandalone && !localStorage.getItem('install_dismissed')) {
  document.getElementById('install-banner').style.display = 'flex';
  document.getElementById('install-banner').querySelector('.install-text').textContent = 'To install: tap the Share button → "Add to Home Screen"';
  document.getElementById('install-btn').style.display = 'none';
}

// ─── SERVICE WORKER ───────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
load();
renderHome();
</script>
